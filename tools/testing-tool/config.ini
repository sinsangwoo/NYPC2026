# Lines starting with '#' are ignored.
#
# How to specify a map (if multiple options apply, the earlier one takes priority):
#   (1) Use INPUT=<map file> to load a pre-generated map
#   (2) Use SEED to generate a new map on each run. If NP/KP are omitted,
#       they are determined from the seed alone.
#   (3) Use NP/KP to specify map size. If SEED is omitted, a random seed is used.
# If all three are omitted, a random seed is generated and NP/KP are also determined from the seed.

; INPUT=input.txt
# SEED=42
# NP=14
# KP=4

LOG=log.txt
EXEC1=python3 sample-code.py P1
EXEC2=python3 sample-code.py P2
